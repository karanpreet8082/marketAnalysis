name: Daily Agent Portfolio Update

on:
  # Run at 5:30 PM IST (12:00 PM UTC) every weekday - after market close
  schedule:
    - cron: '0 12 * * 1-5'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-agent-portfolio:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Agent Portfolio Update
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          cd src
          python agent_portfolio.py
      
      - name: Copy data files for web
        run: |
          mkdir -p reports/data
          cp data/*.json reports/data/ 2>/dev/null || true
      
      - name: Commit and push agent portfolio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add data files
          git add data/agent_portfolio.json reports/ || true
          
          # Commit if there are changes
          git diff --staged --quiet || git commit -m "🤖 Agent portfolio update $(TZ='Asia/Kolkata' date '+%Y-%m-%d')"
          
          # Push changes
          git push || echo "No changes to push"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          destination_dir: .
