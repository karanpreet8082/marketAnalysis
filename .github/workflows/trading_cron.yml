name: Autonomous Trading Agent

on:
  # Schedule: Every 30 minutes, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
  # Cron format: minute hour day month day-of-week
  # UTC 3:45 AM = IST 9:15 AM (5:30 hour offset)
  # UTC 10:00 AM = IST 3:30 PM
  schedule:
    # 3:45 AM UTC (9:15 AM IST)
    - cron: '45 3 * * 1-5'
    # 4:15 AM UTC
    - cron: '15 4 * * 1-5'
    # 4:45 AM UTC
    - cron: '45 4 * * 1-5'
    # 5:15 AM UTC
    - cron: '15 5 * * 1-5'
    # 5:45 AM UTC
    - cron: '45 5 * * 1-5'
    # 6:15 AM UTC
    - cron: '15 6 * * 1-5'
    # 6:45 AM UTC
    - cron: '45 6 * * 1-5'
    # 7:15 AM UTC
    - cron: '15 7 * * 1-5'
    # 7:45 AM UTC
    - cron: '45 7 * * 1-5'
    # 8:15 AM UTC
    - cron: '15 8 * * 1-5'
    # 8:45 AM UTC
    - cron: '45 8 * * 1-5'
    # 9:15 AM UTC
    - cron: '15 9 * * 1-5'
    # 9:45 AM UTC
    - cron: '45 9 * * 1-5'
    # 10:00 AM UTC (3:30 PM IST - last trade window)
    - cron: '0 10 * * 1-5'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  trading-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Agent
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python src/trading_agent.py
        continue-on-error: true

      - name: Configure Git
        run: |
          git config --local user.email "trading-agent@github.com"
          git config --local user.name "Trading Agent"

      - name: Push portfolio updates
        run: |
          # Only push if there are changes
          if ! git diff --quiet data/trading_agent_portfolio.json 2>/dev/null; then
            git add data/trading_agent_portfolio.json
            git commit -m "Trading Agent: Portfolio update - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No portfolio changes to commit"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-agent-logs
          path: |
            data/trading_agent_portfolio.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "Trading Agent cycle failed. Check logs above for details."
          exit 1
